<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#6366f1"/>
  <!-- Path dots connected by lines (roadmap metaphor) -->
  <!-- Line from dot1 to dot2 -->
  <line x1="8" y1="22" x2="14" y2="14" stroke="#a5b4fc" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Line from dot2 to dot3 -->
  <line x1="14" y1="14" x2="22" y2="10" stroke="#a5b4fc" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Dot 1 (start) -->
  <circle cx="8" cy="22" r="2.5" fill="#ffffff"/>
  <!-- Dot 2 (mid) -->
  <circle cx="14" cy="14" r="2.5" fill="#c7d2fe"/>
  <!-- Dot 3 (end/goal) — larger, highlighted -->
  <circle cx="22" cy="10" r="3.5" fill="#ffffff"/>
  <!-- Small chevron inside goal dot to suggest "done" / forward -->
  <polyline points="20.5,10 22,8.5 23.5,10" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
